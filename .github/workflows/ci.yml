name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # no third-party dependencies, nothing to cache

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
